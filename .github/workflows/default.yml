name: Default CI

on:
  pull_request:
  push:
    branches:
      - 'main'

concurrency:
  group: ${{ github.workflow }}|${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - name: CI checks
        run: |
          if [ "${{ github.actor }}" = "github-actions[bot]" ]; then
            echo "Skipping CI for changeset release PR"
            exit 0
          fi
          pnpm lint
          pnpm format:check
          pnpm test
          pnpm build
